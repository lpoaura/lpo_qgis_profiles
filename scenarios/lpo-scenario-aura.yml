# yaml-language-server: $schema=https://raw.githubusercontent.com/qgis-deployment/qgis-deployment-toolbelt-cli/refs/heads/main/docs/schemas/scenario/qdt_scenario.json

metadata:
  title: "Scenario installation QGIS LPO AuRA"
  id: qdt-lpo
  description: >-
    Déploiement QGIS LPO AURA

# Toolbelt settings
settings:
  SCENARIO_VALIDATION: true

# Deployment workflow, step by step
steps:
  - name: Find installed QGIS
    uses: qgis-installation-finder
    with:
      version_priority:
        - "3.40"
        - "3.44"
      if_not_found: error

  - name: Download profiles from remote git repository
    uses: qprofiles-downloader
    with:
      source: https://github.com/lpoaura/lpo_qgis_profiles.git
      protocol: git_remote
      branch: main

  - name: >-
      Met à jour les profils installés dans QGIS (%APPDATA%/QGIS3/profiles) 
      à partir de la copie locale de QDT (.cache/qgis-deployment-toolbelt)
    uses: qprofiles-synchronizer
    with:
      sync_mode: overwrite

  - name: Download plugins
    uses: qplugins-downloader
    with:
      force: false
      threads: 5

  - name: Synchronize plugins
    uses: qplugins-synchronizer
    with:
      action: create_or_restore

  - name: Create shortcuts for profiles
    uses: shortcuts-manager
    with:
      action: create_or_restore
      include:
        - profile: mfs
          label: "Annuaire MFS"
          desktop: true
          start_menu: true
          icon: "mfs.ico"
          additional_arguments: "--noversioncheck --skipbadlayers --project \"%APPDATA%\\QGIS\\QGIS3\\profiles\\mfs\\project_default.qgz\""

  - name: Create shortcuts for profiles
    uses: shortcuts-manager
    with:
      action: create_or_restore
      include:
        - profile: naturaliste
          label: "QGIS LPO AuRA"
          desktop: true
          start_menu: true
          icon: "logo_qgis_lpo.ico"
          additional_arguments: "--noversioncheck --skipbadlayers"

  - name: Create shortcuts for profiles
    uses: shortcuts-manager
    with:
      action: create_or_restore
      include:
        - profile: aura_dev
          label: "QGIS Dev"
          desktop: true
          start_menu: true
          icon: "logo_qgis_dev.ico"
          additional_arguments: "--noversioncheck --skipbadlayers"

  - name: Set splash screen
    uses: splash-screen-manager
    with:
      action: create_or_restore
      strict: false

  - name: Set default profile to naturaliste
    uses: default-profile-setter
    with:
      profile: naturaliste
      force_profile_selection_policy: 1
